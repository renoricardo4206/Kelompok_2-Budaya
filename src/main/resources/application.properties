spring.application.name=budaya

spring.datasource.url=jdbc:mysql://localhost:3306/budaya
spring.datasource.username=root
spring.datasource.password=SheilaZeren4206
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Dev: matikan cache Thymeleaf agar perubahan template langsung terlihat tanpa restart
spring.thymeleaf.cache=false

# Dev: jangan cache file statis (CSS/JS) agar perubahan langsung terlihat saat refresh biasa
spring.web.resources.cache.period=0

# Batas ukuran upload gambar (sinkron dengan UI: maks 10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB